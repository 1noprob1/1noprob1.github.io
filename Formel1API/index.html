<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <main>
        <header> Finn De Beste Kimi Qoutes!!</header>
        <div id="randomQoutes">
            <h1>Få en tilfeldig Kimi qoute</h1>
            <button id="random" type="button">tilfeldig qoute</button>
        </div>
        <div id="yearQoutes">
            <h1>Finn alle quoptes fra et spesefikt år</h1>
            <form id="form">
               <label for="year"></label>
               <input type="number" id="year" name="year" placeholder="Skriv inn et år">
               <button type="submit">Sjekk</button>
            </form>
        </div>
    </main>
</body>
</html>
